name: Refresh hosted jobs

# One job per provider, mirroring how the reference aggregator sustains a daily full-registry crawl.
# Previously every provider shared a single job at --concurrency 12, so the global cap overrode the
# per-provider pools in src/jobs.mjs entirely and one slow ATS throttled all the others. Each
# provider now gets its own runner, its own 6-hour budget, and its own pool size.
#
# This runs on GitHub Actions rather than the Cloudflare queues because the repository is public,
# which makes Actions minutes free and unmetered -- the refresh is the single largest cost driver on
# the Cloudflare side.

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "Refresh a single provider instead of all of them"
        required: false
        type: string
      sync_limit:
        description: "Optional number of boards to refresh per provider"
        required: false
        type: string

concurrency:
  group: hosted-job-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      # Concurrency matches DEFAULT_PROVIDER_CONCURRENCY in src/jobs.mjs. Getro stays at 2 because
      # it is already returning HTTP 530 under much lighter load.
      matrix:
        include:
          - provider: workday
            concurrency: 50
          - provider: greenhouse
            concurrency: 30
          - provider: icims
            concurrency: 30
          - provider: lever
            concurrency: 30
          - provider: bamboohr
            concurrency: 10
          - provider: ashby
            concurrency: 5
          - provider: paylocity
            concurrency: 5
          - provider: gem
            concurrency: 6
          - provider: sparkhire
            concurrency: 3
          - provider: getro
            concurrency: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh ${{ matrix.provider }} boards
        if: ${{ inputs.provider == '' || inputs.provider == matrix.provider }}
        env:
          REMOTE_SYNC_URL: ${{ secrets.REMOTE_SYNC_URL }}
          REMOTE_SYNC_TOKEN: ${{ secrets.REMOTE_SYNC_TOKEN }}
          REMOTE_SITES_TOKEN: ${{ secrets.REMOTE_SITES_TOKEN }}
          SYNC_LIMIT: ${{ inputs.sync_limit }}
        run: |
          EXTRA_ARGS=()
          if [ -n "$SYNC_LIMIT" ]; then EXTRA_ARGS+=(--sync-limit "$SYNC_LIMIT"); fi
          npm run sync:remote -- \
            --providers "${{ matrix.provider }}" \
            --concurrency "${{ matrix.concurrency }}" \
            --timeout-ms 30000 \
            "${EXTRA_ARGS[@]}"
